name: TinyTaskMac Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without a leading v"
        required: true
        default: "0.1.0-preview"
      channel:
        description: "Release channel"
        required: true
        type: choice
        options:
          - preview
          - stable
        default: preview
      publish_release:
        description: "Publish a GitHub release"
        required: true
        type: boolean
        default: true
      deploy_site:
        description: "Build and deploy the website after manifest update"
        required: true
        type: boolean
        default: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    defaults:
      run:
        shell: bash
    env:
      CODESIGN_IDENTITY: ${{ secrets.TINYTASKMAC_CODESIGN_IDENTITY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Resolve release metadata
        id: meta
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
            CHANNEL="stable"
            PUBLISH_RELEASE="true"
            DEPLOY_SITE="true"
          else
            VERSION="${{ inputs.version }}"
            CHANNEL="${{ inputs.channel }}"
            TAG="v${VERSION}"
            PUBLISH_RELEASE="${{ inputs.publish_release }}"
            DEPLOY_SITE="${{ inputs.deploy_site }}"
          fi

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "channel=${CHANNEL}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "publish_release=${PUBLISH_RELEASE}" >> "${GITHUB_OUTPUT}"
          echo "deploy_site=${DEPLOY_SITE}" >> "${GITHUB_OUTPUT}"

      - name: Import Developer ID certificate
        if: ${{ secrets.TINYTASKMAC_DEVELOPER_ID_CERT_BASE64 != '' && secrets.TINYTASKMAC_DEVELOPER_ID_CERT_PASSWORD != '' && secrets.TINYTASKMAC_KEYCHAIN_PASSWORD != '' }}
        env:
          CERT_BASE64: ${{ secrets.TINYTASKMAC_DEVELOPER_ID_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.TINYTASKMAC_DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.TINYTASKMAC_KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="${RUNNER_TEMP}/tinytaskmac-cert.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/tinytaskmac.keychain-db"

          echo "${CERT_BASE64}" | base64 --decode > "${CERT_PATH}"
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERT_PATH}" -k "${KEYCHAIN_PATH}" -P "${CERT_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}"

      - name: Store notarization profile
        if: ${{ secrets.TINYTASKMAC_NOTARY_KEY_ID != '' && secrets.TINYTASKMAC_NOTARY_ISSUER_ID != '' && secrets.TINYTASKMAC_NOTARY_PRIVATE_KEY != '' }}
        env:
          NOTARY_KEY_ID: ${{ secrets.TINYTASKMAC_NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.TINYTASKMAC_NOTARY_ISSUER_ID }}
          NOTARY_PRIVATE_KEY: ${{ secrets.TINYTASKMAC_NOTARY_PRIVATE_KEY }}
        run: |
          KEY_PATH="${RUNNER_TEMP}/AuthKey_${NOTARY_KEY_ID}.p8"
          printf '%s' "${NOTARY_PRIVATE_KEY}" > "${KEY_PATH}"
          xcrun notarytool store-credentials TinyTaskMacNotary --key "${KEY_PATH}" --key-id "${NOTARY_KEY_ID}" --issuer "${NOTARY_ISSUER_ID}"
          echo "NOTARYTOOL_KEYCHAIN_PROFILE=TinyTaskMacNotary" >> "${GITHUB_ENV}"

      - name: Install build tools
        run: brew install xcodegen

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Prepare scripts
        run: chmod +x scripts/*.sh

      - name: Package macOS release
        env:
          USE_XCODEGEN_APP_TARGET: 1
        run: ./scripts/package_macos_release.sh "${{ steps.meta.outputs.version }}" "${{ steps.meta.outputs.channel }}"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tinytask-mac-release-${{ steps.meta.outputs.version }}
          path: |
            .dist/releases/${{ steps.meta.outputs.version }}/TinyTaskMac.dmg
            .dist/releases/${{ steps.meta.outputs.version }}/TinyTaskMac.zip
            .dist/releases/${{ steps.meta.outputs.version }}/SHA256SUMS.txt

      - name: Publish GitHub release
        if: ${{ steps.meta.outputs.publish_release == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          TITLE="TinyTaskMac ${{ steps.meta.outputs.version }}"
          NOTES="macOS ${{ steps.meta.outputs.channel }} release for TinyTaskMac."

          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            gh release create "${TAG}" --title "${TITLE}" --notes "${NOTES}"
          fi

          gh release upload "${TAG}" \
            ".dist/releases/${{ steps.meta.outputs.version }}/TinyTaskMac.dmg" \
            ".dist/releases/${{ steps.meta.outputs.version }}/TinyTaskMac.zip" \
            ".dist/releases/${{ steps.meta.outputs.version }}/SHA256SUMS.txt" \
            --clobber

      - name: Update checked-in release manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}"
          RELEASES_BASE="${REPO_URL}/releases"
          VERSION="${{ steps.meta.outputs.version }}"
          CHANNEL="${{ steps.meta.outputs.channel }}"
          STATUS="${CHANNEL}"
          DMG_URL=""
          ZIP_URL=""
          CHECKSUM_URL="${RELEASES_BASE}"
          RELEASE_NOTES_URL="${RELEASES_BASE}"

          if [[ "${{ steps.meta.outputs.publish_release }}" == "true" ]]; then
            DMG_URL="${REPO_URL}/releases/download/${{ steps.meta.outputs.tag }}/TinyTaskMac.dmg"
            ZIP_URL="${REPO_URL}/releases/download/${{ steps.meta.outputs.tag }}/TinyTaskMac.zip"
            CHECKSUM_URL="${REPO_URL}/releases/download/${{ steps.meta.outputs.tag }}/SHA256SUMS.txt"
            RELEASE_NOTES_URL="${REPO_URL}/releases/tag/${{ steps.meta.outputs.tag }}"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "${DEFAULT_BRANCH}"
          git checkout "${DEFAULT_BRANCH}"

          node ./scripts/update_release_manifest.mjs \
            --version "${VERSION}" \
            --channel "${CHANNEL}" \
            --publishedAt "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --macosStatus "${STATUS}" \
            --minVersion "macOS 13.0" \
            --dmgUrl "${DMG_URL}" \
            --zipUrl "${ZIP_URL}" \
            --checksumUrl "${CHECKSUM_URL}" \
            --releaseNotesUrl "${RELEASE_NOTES_URL}" \
            --windowsStatus planned \
            --linuxStatus planned

          if ! git diff --quiet -- website/public/release-manifest.json; then
            git add website/public/release-manifest.json
            git commit -m "Update TinyTaskMac release manifest for ${VERSION}"
            git push origin "HEAD:${DEFAULT_BRANCH}"
          fi

      - name: Build website
        if: ${{ steps.meta.outputs.deploy_site == 'true' }}
        working-directory: website
        run: npm run build

      - name: Deploy website
        if: ${{ steps.meta.outputs.deploy_site == 'true' && secrets.NETLIFY_AUTH_TOKEN != '' && secrets.NETLIFY_SITE_ID != '' }}
        working-directory: website
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: npx netlify deploy --dir=dist --prod --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN"
