<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="TinyTaskMac">
  <defs>
    <linearGradient id="bg" x1="90" x2="1100" y1="80" y2="560" gradientUnits="userSpaceOnUse">
